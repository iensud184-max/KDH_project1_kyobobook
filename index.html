<html lang="ko">

<head>

    <title>교보문고</title>

    <!-- Link Swiper's CSS -->

    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v7.0.0/css/all.css">
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/reset.css">
</head>

<body>
    <!-- 헤더 이미지 -->
    <header>
        <div id="header_top_img">
            <img src="https://contents.kyobobook.co.kr/display/초중고신학기_1200_70_995b4f1f4aa4484a943850639faeb52b.jpg"
                alt="header_top_img">
        </div>
    </header>

    <!-- 이미지부터 카테고리, 로그인 -->
    <div id="header_main">
        <div id="category"></div>
        <div id="login"></div>
    </div>


    <!-- 로고부터 오늘의 선택 전까지 -->
    <main>
        <div id="main_top">
            <div id="mt_top">
                <div id="logo">
                    <img src="https://contents.kyobobook.co.kr/resources/fo/images/common/ink/united/logo_book.svg"
                        alt="logo">
                </div>
                <search>
                    <!-- /* ////////////////////////////////////////////// */ -->
                </search>
                <div id="emoticon">
                    <div id="shopping">
                        <i class="fa-solid fa-cart-shopping"></i>
                    </div>
                    <div id="mypage">
                        <i class="fa-regular fa-circle-user"></i>
                    </div>
                </div>


            </div>
            <menu>
                <div id="menu_img">
                    <i class="fa-solid fa-bars"></i>
                </div>
                <div id="menu_text"></div>
            </menu>
        </div>
        <div id="silder">
            <!-- Swiper -->
            <div class="swiper Swiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide">Slide 1</div>
                    <div class="swiper-slide">Slide 2</div>
                    <div class="swiper-slide">Slide 3</div>
                    <div class="swiper-slide">Slide 4</div>
                    <div class="swiper-slide">Slide 5</div>
                </div>
                <div class="swiper-button-next"></div>
                <div class="swiper-button-prev"></div>
                <div class="swiper-pagination"></div>
            </div>
            <!-- <div class="swiper mySwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide">Slide 1</div>
                    <div class="swiper-slide">Slide 2</div>
                    <div class="swiper-slide">Slide 3</div>
                    <div class="swiper-slide">Slide 4</div>
                    <div class="swiper-slide">Slide 5</div>
                </div>
                <div class="swiper-pagination"></div>
            </div> -->
        </div>
        <div id="event">

        </div>
    </main>

    <!-- 오늘의 선택부터 캐스팅까지 -->
    <section>

    </section>

    <!-- 캐스팅부터 마지막까지 -->
    <footer></footer>





    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <!-- Initialize Swiper -->
    <script src="./js/swiper.js"></script>
    <script src="./js/book.js"></script>
